<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Belajar Form HTML</title>
    </head>
    <body>
        <h3>Formulir Identitas:</h3>
        <form>
            <label for="fname">Nama Lengkap:</label>
            <input type="text" id="fname" name="fname"/><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"/><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password"/><br>

            <label for="gender">Jenis Kelamin:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Laki-laki</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Perempuan</label><br>
            
            <label for="hobby_read">Hobby:</label>
            <input type="checkbox" id="hobby_read" name="hobby" value="reading">
            <label for="hobby_read">Membaca</label>
            <input type="checkbox" id="hobby_swim" name="hobby" value="swimming">
            <label for="hobby_swim">Berenang</label>
            <input type="checkbox" id="hobby_code" name="hobby" value="coding">
            <label for="hobby_code">Coding</label>
            <input type="checkbox" id="hobby_cycling" name="hobby" value="cycling">
            <label for="hobby_cycling">Bersepeda</label>
            <input type="checkbox" id="hobby_jogging" name="hobby" value="jogging">
            <label for="hobby_jogging">Berlari</label>
            <br>
            <input type="submit" value="Submit"/>
        </form>
    </body>
</html>
